name: Release Standalone Archive

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-standalone-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642e84d8d7f0555d3cc10b7
        with:
          node-version: 22

      - name: Run tests
        run: npm test

      - name: Build standalone archive
        run: bash ./scripts/build-release.sh "${{ github.event.release.tag_name }}"

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.zip dist/*.tar.gz dist/SHA256SUMS.txt --clobber
