name: Release Standalone Archive

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-standalone-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: npm test

      - name: Build standalone archive
        run: bash ./scripts/build-release.sh "${{ github.event.release.tag_name }}"

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.zip dist/*.tar.gz dist/SHA256SUMS.txt --clobber
